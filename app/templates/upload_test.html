<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven Assistant - Vault Upload Test</title>
    <link rel="manifest" href="/manifest.json">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary-bg: #0A0A0A;
            --panel-bg: rgba(20, 20, 20, 0.85);
            --gold-accent: #D4AF37;
            --text-main: #FFFFFF;
            --text-muted: #888888;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent 40%);
        }

        .upload-container {
            background: var(--panel-bg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--gold-accent);
            margin: 0 0 10px 0;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .drop-zone {
            border: 2px dashed rgba(212, 175, 55, 0.4);
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--gold-accent);
            background: rgba(212, 175, 55, 0.05);
        }

        .drop-zone .material-symbols-outlined {
            font-size: 48px;
            color: var(--gold-accent);
            margin-bottom: 15px;
        }

        .drop-zone-text {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .drop-zone-subtext {
            font-size: 12px;
            color: var(--text-muted);
        }

        #fileInput {
            display: none;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .input-group input[type="text"]:focus {
            outline: none;
            border-color: var(--gold-accent);
        }

        .btn-upload {
            background: linear-gradient(45deg, #B8860B, #FFD700);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .btn-upload:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #statusMessage {
            margin-top: 20px;
            font-size: 14px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .status-success {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .status-error {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border: 1px solid rgba(255, 77, 77, 0.2);
        }
    </style>
</head>

<body>

    <div class="upload-container">
        <div class="header">
            <h1>VAULT LAB</h1>
            <p>Upload files securely to the Seven Assistant processing engine.</p>
        </div>

        <form id="uploadForm">
            <div class="input-group">
                <label for="userId">User ID (WhatsApp Number)</label>
                <input type="text" id="userId" placeholder="Ex: 551199999999" required>
            </div>

            <div class="drop-zone" id="dropZone">
                <span class="material-symbols-outlined">cloud_upload</span>
                <span class="drop-zone-text">Click or drag file to this area</span>
                <span class="drop-zone-subtext">PDF, DOCX, TXT, PNG, JPG (Max 5MB)</span>
                <input type="file" id="fileInput" required>
            </div>

            <div id="fileInfo" style="margin-bottom:20px; color:var(--gold-accent); font-size:14px; display:none;">
            </div>

            <button type="submit" class="btn-upload" id="uploadBtn">
                <span class="material-symbols-outlined">memory</span>
                PROCESS FILE
            </button>
        </form>

        <div id="statusMessage"></div>
    </div>

    <script>
        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }

        // File Drag & Drop Logic
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateFileInfo();
            }
        });

        fileInput.addEventListener('change', updateFileInfo);

        function updateFileInfo() {
            if (fileInput.files.length > 0) {
                fileInfo.textContent = `Selected: ${fileInput.files[0].name}`;
                fileInfo.style.display = 'block';
            }
        }

        // Form Submit
        const form = document.getElementById('uploadForm');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusMsg = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = fileInput.files[0];
            const userId = document.getElementById('userId').value;

            if (!file || !userId) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('user_id', userId);

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">autorenew</span> PROCESSING...';
            statusMsg.style.display = 'none';

            try {
                const response = await fetch('/api/upload-document', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                statusMsg.style.display = 'block';
                if (response.ok) {
                    statusMsg.className = 'status-success';
                    statusMsg.innerHTML = `✅ Successfully processed!<br><small>Status: ${data.status}</small>`;
                    form.reset();
                    fileInfo.style.display = 'none';
                } else {
                    statusMsg.className = 'status-error';
                    statusMsg.textContent = `❌ Error: ${data.detail || 'Failed to process file'}`;
                }
            } catch (error) {
                statusMsg.style.display = 'block';
                statusMsg.className = 'status-error';
                statusMsg.textContent = `❌ Network Error: Could not reach server.`;
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<span class="material-symbols-outlined">memory</span> PROCESS FILE';
            }
        });
    </script>
</body>

</html>
